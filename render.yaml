# render.yaml — AcademicRadar en Render.com
#
# OPCIONES DE PERSISTENCIA (elegir una):
#
#   OPCIÓN A — Free tier (sin disco):
#     El DB vive en el filesystem local del contenedor.
#     Se resetea en cada redeploy, pero el digest por mail conserva el historial.
#     → Usar este archivo tal cual.
#
#   OPCIÓN B — Starter plan ($7/mes) con disco persistente:
#     Descomentar el bloque "disk:" y "plan: starter" de abajo.
#     El DB sobrevive redeploys indefinidamente.
#
#   OPCIÓN C — Turso (free, SQLite en la nube, sin perder datos):
#     Ver instrucciones en README o pedir a Claude que migre database.py.

services:
  - type: web
    name: academic-radar
    runtime: python
    plan: free        # cambiar a "starter" si querés disco persistente ($7/mes)
    region: oregon

    buildCommand: pip install -r requirements.txt

    startCommand: >
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
      --server.enableXsrfProtection false

    healthCheckPath: /

    # ── OPCIÓN B: descomentar estas líneas para disco persistente ──────────
    # disk:
    #   name: academic-radar-data
    #   mountPath: /data
    #   sizeGB: 1

    envVars:
      # OPCIÓN A (free): DB en filesystem local (se resetea en redeploy)
      - key: DB_PATH
        value: academic_radar.db

      # OPCIÓN B: descomentar si usás disco persistente
      # - key: DB_PATH
      #   value: /data/academic_radar.db

      # ── Secrets: completar en el dashboard de Render → Environment ────────
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: EMAIL_FROM
        sync: false

      # ── Tuning opcional ───────────────────────────────────────────────────
      - key: SCRAPER_DELAY
        value: "2.0"
      - key: ARXIV_MAX_RESULTS
        value: "30"
      - key: SCHOLAR_MAX_RESULTS
        value: "10"
      - key: DAYS_LOOKBACK
        value: "30"
